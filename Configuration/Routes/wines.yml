_feature: wines
_feature_default: true

wines:
  template: 'Wines/List.twig'
  pageTitle: 'Wine list'
  public: true
  sitemap: true
  dataProcessing:
    wines:
      function: getWinesAll
      params:
        cluster:
          - winery
          - type
          - taste_id
          - vintage
          - grapetypeIds
    bundles: getBundlesAll
    items:
      processor: 'formatter'
      function: 'mergeData'
      useRouteData: FALSE
      useData:
        - wines
        - bundles
    wineries: getWineriesAll

wines/{path_segment}:
  template: 'Wines/Detail.twig'
  pageTitle: 'Wine details'
  public: true
  sitemap:
    function: getWinesAll
    params:
      pageSize: 50
      lazy: false
    dataKey: 'wines'
  dataProcessing:
    wine: getWine
    wineries: getWineriesAll

search:
  template: 'Wines/Search.twig'
  pageTitle: 'Search wines'
  method: all
  public: true
  dataProcessing:
    search:
      function: searchWine
      postParams: query,max
      getParams: query,page
      params:
        pageSize: 6
        lazy: false
