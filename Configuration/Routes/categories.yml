_feature: categories
_feature_default: true

category:
  template: 'Categories/List.twig'
  pageTitle: 'Category list'
  public: true
  sitemap: true
  dataProcessing:
    categories: getCategoriesAll
    wineries: getWineriesAll

category/{path_segment}:
  template: 'Categories/Detail.twig'
  pageTitle: 'Category details'
  public: true
  sitemap:
    function: getCategoriesAll
    params:
      pageSize: 50
      lazy: false
    dataKey: 'categories'
  dataProcessing:
    category: getCategory
    wines:
      function: getWinesByCategory
      params:
        language: 'de'
        cluster:
          - winery
          - type
          - taste_id
          - vintage
          - grapetypeIds
    bundles: getBundlesByCategory
    products: getProductsByCategory
    wineries: getWineriesAll
    items:
      processor: 'formatter'
      function: 'mergeData'
      useRouteData: FALSE
      useData:
        - wines
        - bundles
        - products
